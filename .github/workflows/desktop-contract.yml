name: Desktop Runtime Verification

on:
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-msvc

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: TypeScript check
        run: npm run lint

      - name: Web build
        run: npm run build

      - name: Rust check
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Desktop runtime audit report
        run: npm run audit:desktop
