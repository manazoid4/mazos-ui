name: Desktop Runtime Verification

on:
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-msvc

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: TypeScript check
        run: npm run lint

      - name: Web build
        run: npm run build

      - name: Rust check
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Strict desktop runtime contract
        run: npm run check:desktop

      - name: Build packaged desktop application
        run: npm run tauri:build

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: mazos-desktop-pr-${{ github.event.pull_request.number || github.run_number }}
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
