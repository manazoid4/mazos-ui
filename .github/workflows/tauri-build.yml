name: Build Windows Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-msvc

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: TypeScript check
        run: npm run lint

      - name: Web build
        run: npm run build

      - name: Rust check
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Packaged desktop runtime contract
        run: npm run check:desktop

      - name: Build Tauri app
        run: npm run tauri:build

      - name: Generate checksums
        shell: pwsh
        run: |
          $files = Get-ChildItem src-tauri/target/release/bundle -Recurse -File |
            Where-Object { $_.Extension -in '.exe', '.msi' }
          if (-not $files) { throw 'No Windows installer artifacts were produced.' }
          $lines = foreach ($file in $files) {
            $hash = (Get-FileHash $file.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($file.Name)"
          }
          $lines | Set-Content src-tauri/target/release/bundle/SHA256SUMS.txt

      - name: Upload verified installers
        uses: actions/upload-artifact@v4
        with:
          name: mazos-windows-installers
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/SHA256SUMS.txt

      - name: Attach verified installers to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/SHA256SUMS.txt
