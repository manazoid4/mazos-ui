name: Build Windows Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: stable-msvc
      - name: Install dependencies
        run: npm ci
      - name: Build Tauri app
        # NOTE: Using standard Next.js build here for CI. 
        # The desktop build wrapper needs API routes moved entirely out of src/app during export.
        run: npm run tauri:build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mazos-windows-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/nsis/*.exe
